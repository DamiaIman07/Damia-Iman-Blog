<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
        // Semak tema secepat mungkin sebelum page render untuk elak screen berkelip putih
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>

    <header>
        <nav>
            <div class="logo">My<span>Portfolio</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <button id="theme-toggle">🌙 Dark Mode</button>
        </nav>
    </header>

    <section>
        <h2>Contact Me</h2>
        <div class="contact-card">
            
            <div class="social-grid">
                <a href="https://github.com/DamiaIman07" target="_blank" class="social-item github">
                    <img src="github.png" alt="GitHub">
                    <span>GitHub</span>
                </a>
                <a href="https://www.linkedin.com/in/damia-iman" target="_blank" class="social-item linkedin">
                    <img src="linkedin.png" alt="LinkedIn">
                    <span>LinkedIn</span>
                </a>
                <a href="https://instagram.com/miayusriii" target="_blank" class="social-item instagram">
                    <img src="instagram.png" alt="Instagram">
                    <span>Instagram</span>
                </a>
            </div>

            <form id="contact-form" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Your email" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea placeholder="Write your message here..." rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-full">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Hak Cipta Terpelihara | Dibina untuk CSD34203.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
