<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - Media Informatika</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">Media <span>Informatika</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><button id="theme-toggle">Toggle Mode</button></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contact">
            <h2>Contact Me</h2>
            
            <div class="contact-card">
                <h3>Let's Connect!</h3>
                <p>Ada sebarang projek atau soalan? Jom borak atau hubungi saya terus melalui media sosial di bawah.</p>
                
                <div class="social-links">
                    <a href="https://instagram.com" target="_blank">
                        <img src="instagram.png" alt="Instagram">
                        <span>Instagram</span>
                    </a>
                    <a href="https://github.com" target="_blank">
                        <img src="github.png" alt="GitHub">
                        <span>GitHub</span>
                    </a>
                </div>

                <form>
                    <div class="form-group">
                        <label for="name">Nama</label>
                        <input type="text" id="name" placeholder="Masukkan nama awak" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Mesej</label>
                        <textarea id="message" placeholder="Tulis mesej di sini..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-full">Hantar Mesej</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Media Informatika. Hak Cipta Terpelihara.</p>
    </footer>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });
    </script>
</body>
</html>
