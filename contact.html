<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - Damia Iman</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Hubungi Saya</h1>
        <nav>
            <a href="index.html">Home</a> | 
            <a href="about.html">About Me</a> | 
            <a href="blog.html">Blog</a> | 
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <main class="portfolio-container">
        <div class="card full-width-card">
            <h2>Hantar Mesej Anda ✉️</h2>
            <form action="#">
                <p>
                    <label for="name">Nama:</label><br>
                    <input type="text" id="name" required>
                </p>
                <p>
                    <label for="email">Emel:</label><br>
                    <input type="email" id="email" required>
                </p>
                <p>
                    <label for="message">Mesej:</label><br>
                    <textarea id="message" rows="4" required></textarea>
                </p>
                <button type="submit">Hantar Mesej</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Damia Iman. All Rights Reserved.</p>
        <button id="dark-mode-toggle">🌙 Dark Mode</button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
