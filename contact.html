<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get In Touch | Damia Iman</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <span class="nav-logo">Damia.</span>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="blog.html">Blog</a>
                <a href="contact.html" class="active">Contact</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <section class="content-section">
            <div class="contact-card">
                <h2>Let's Collaborate ✉️</h2>
                <p>Mempunyai sebarang idea projek reka bentuk, kolaborasi kreatif, atau pertanyaan akademik? Hubungi saya melalui borang di bawah:</p>
                
                <form action="#" class="styled-form">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="example@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="5" placeholder="Write your message here..." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Damia Iman. All Rights Reserved.</p>
        <button id="dark-mode-toggle" class="toggle-btn">🌙 Change Theme</button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
