<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - My Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Menggunakan ikon Boxicons sedia ada -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <!-- PEMBETULAN KHAS: Memaksa ikon Boxicons keluar semula walaupun ada font !important di CSS -->
    <style>
        .social-links i, .submit-btn i {
            font-family: 'boxicons' !important;
            font-weight: normal !important;
            font-style: normal !important;
        }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-mode'); }
    </script>

    <header>
        <nav>
            <div class="logo">My<span>Portfolio</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <button id="theme-toggle">🌙 Dark Mode</button>
        </nav>
    </header>

    <section>
        <h2>Contact Me</h2>
        <div class="contact-container">
            <p class="contact-subtitle">Feel free to drop a message or connect with me via social media!</p>
            
            <!-- BORANG PERTANYAAN (FORM) -->
            <form class="contact-form" action="#" method="POST">
                <div class="input-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your full name" required>
                </div>
                
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Your email address" required>
                </div>
                
                <div class="input-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Send Message <i class='bx bx-send'></i></button>
            </form>

            <div class="divider"><span>OR CONNECT WITH ME</span></div>

            <!-- IKON MEDIA SOSIAL BERWARNA UNGU DENGAN INSTAGRAM -->
            <div class="social-links">
                <a href="https://instagram.com/" target="_blank" class="social-icon" title="Instagram"><i class='bx bxl-instagram'></i></a>
                <a href="https://github.com/" target="_blank" class="social-icon" title="GitHub"><i class='bx bxl-github'></i></a>
                <a href="https://linkedin.com/" target="_blank" class="social-icon" title="LinkedIn"><i class='bx bxl-linkedin-square'></i></a>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Copyright | Built for CSD34203.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
