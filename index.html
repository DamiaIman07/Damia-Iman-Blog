            document.body.classList.add('dark-mode'); 
        }

    <header>
        <nav>
            <div class="logo">My<span>Portfolio</span></div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>

                <li><a href="contact.html">Contact</a></li>
            </ul>

        </nav>
    </header>

    <section class="hero-section">
        <div class="hero-container full-width-hero">
            <div class="hero-text home-box">
                <h1>Hi, I'm <span>Damia Iman</span></h1>
                <p>Welcome to my digital portfolio and blog.</p>
                <!-- Butang ini akan automatik panggil .cta-btn daripada style.css yang baru -->
                <a href="blog.html" class="cta-btn">View My Blog</a>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Copyright | Built for CSD34203.</p>
